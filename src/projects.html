title: Projects

<article>
	<section>
		<header>
			<hgroup>
				<h1>Projects</h1>
				<h2>Learning by Doing.</h2>
			</hgroup>
		</header>
	</section>

	<hr />

	<section>
		{% if projects.length !== 0 %}
		<div class="grid">{% for project in projects %} {% projectCard project %} {% endfor %}</div>
		{% else %}
		<p>No projects to display...</p>
		{% endif %}
	</section>
</article>
